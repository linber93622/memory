<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Spiel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="timer">00:00</div>

    <h1>Memory</h1>

    <div id="selection">
        <h2>Waehle die Anzahl der Spieler:</h2>
        <button class="player-btn" data-players="1">1 Spieler</button>
        <button class="player-btn" data-players="2">2 Spieler</button>
        <button class="player-btn" data-players="3">3 Spieler</button>
        <button class="player-btn" data-players="4">4 Spieler</button>
        <button class="player-btn" data-players="5">5 Spieler</button>
        <button class="player-btn" data-players="6">6 Spieler</button>
        <button class="player-btn" data-players="7">7 Spieler</button>
    </div>

    <div id="game-area" style="display: none;">
        <div id="player-info"></div>
        <p id="moves">Zuege: 0</p>
        <p id="winner"></p>
        <button id="restart-btn">Neues Spiel</button>
        <div id="game-board"></div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
</body>
</html>
